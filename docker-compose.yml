version: "3.8"

# ============================================
# Production Docker Compose Configuration
# ============================================
#
# Services:
# - postgres: PostgreSQL database
# - strapi: Strapi CMS backend
# - frontend: Next.js frontend
#
# Network:
# - All services communicate via internal network
# - Only frontend and strapi expose ports to host
# ============================================

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: dental-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dental_cms_strapi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - dental-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

    # Don't expose port to host in production
    # Only accessible via internal network

  # ============================================
  # Strapi CMS Backend
  # ============================================
  strapi:
    build:
      context: ./strapi-cms
      dockerfile: Dockerfile

    container_name: dental-strapi
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      # Server
      HOST: 0.0.0.0
      PORT: 1337

      # Database
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-dental_cms_strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_SSL: false

      # Secrets (load from .env)
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}

      # URLs
      PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:1337}

      # Node
      NODE_ENV: production

    volumes:
      - strapi_uploads:/app/public/uploads
      - strapi_cache:/app/.cache

    ports:
      - "${STRAPI_PORT:-1337}:1337"

    networks:
      - dental-network

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:1337/_health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: ./dental-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}

    container_name: dental-frontend
    restart: unless-stopped

    depends_on:
      strapi:
        condition: service_healthy

    environment:
      # Strapi API
      STRAPI_URL: http://strapi:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}

      # Next.js
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      NODE_ENV: production

    ports:
      - "${FRONTEND_PORT:-3000}:3000"

    networks:
      - dental-network

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
    name: dental-postgres-data

  strapi_uploads:
    driver: local
    name: dental-strapi-uploads

  strapi_cache:
    driver: local
    name: dental-strapi-cache

# ============================================
# Networks
# ============================================
networks:
  dental-network:
    driver: bridge
    name: dental-network
