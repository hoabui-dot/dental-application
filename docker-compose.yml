version: "3.8"

# ============================================
# Production Docker Compose Configuration
# ============================================
#
# Services:
# - postgres: PostgreSQL database
# - strapi: Strapi CMS backend
# - frontend: Next.js frontend
#
# Network:
# - All services communicate via internal network
# - Only frontend and strapi expose ports to host
# ============================================

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: dental-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dental_cms_strapi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - dental-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

    # Don't expose port to host in production
    # Only accessible via internal network

  # ============================================
  # Strapi CMS Backend
  # ============================================
  strapi:
    build:
      context: ./strapi-cms
      dockerfile: Dockerfile

    image: vanhoadotbui2628/dental_cms:1.0.0
    platform: linux/amd64
    container_name: dental-strapi
    restart: unless-stopped
    environment:
      # Server
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: production

      # Database
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-dental_cms_strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_SSL: "false"
      DATABASE_SCHEMA: public

      # Secrets (load from .env)
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}

      # URLs
      PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:1337}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PREVIEW_SECRET: ${PREVIEW_SECRET}
      STRAPI_WEBHOOK_SECRET: ${STRAPI_WEBHOOK_SECRET}
      NEXTJS_URL: ${NEXTJS_URL:-http://localhost:3000}

    volumes:
      - strapi_uploads:/app/public/uploads
      - strapi_cache:/app/.cache

    ports:
      - "${STRAPI_PORT:-1337}:1337"

    networks:
      - dental-network

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:1337/_health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: ./dental-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
        NEXT_PREVIEW_SECRET: your-secure-preview-secret-change-in-production
        STRAPI_URL: https://knight-cheese-advisor-para.trycloudflare.com
        STRAPI_API_TOKEN: 7f399a0c6012eb5520522f741cfc8ea0f3c5d3b32c5f1d08566bd951013faca178f9f8303403de061571bbee3edcad872b0b595a58a1892617c59f484605ecfcf3e7cdfe38de7322730eba6a32826aeab5d4ed8724f93330f0f28dd3963e83c291fd51df8b8dc9d6b43d06c7295861280d448b8d26e15064cc5dc02e242814f9
    platform: linux/amd64
    image: vanhoadotbui2628/dental_frontend:1.0.2
    container_name: dental-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      STRAPI_URL: https://knight-cheese-advisor-para.trycloudflare.com
      STRAPI_API_TOKEN: 7f399a0c6012eb5520522f741cfc8ea0f3c5d3b32c5f1d08566bd951013faca178f9f8303403de061571bbee3edcad872b0b595a58a1892617c59f484605ecfcf3e7cdfe38de7322730eba6a32826aeab5d4ed8724f93330f0f28dd3963e83c291fd51df8b8dc9d6b43d06c7295861280d448b8d26e15064cc5dc02e242814f9
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NEXT_PREVIEW_SECRET: your-secure-preview-secret-change-in-production

    ports:
      - "3003:3000"

    networks:
      - dental-network

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
    name: dental-postgres-data

  strapi_uploads:
    driver: local
    name: dental-strapi-uploads

  strapi_cache:
    driver: local
    name: dental-strapi-cache

# ============================================
# Networks
# ============================================
networks:
  dental-network:
    driver: bridge
    name: dental-network
